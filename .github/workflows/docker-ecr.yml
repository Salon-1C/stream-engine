name: Deploy stream-engine to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: Salon-1C/infrastructure/.github/workflows/reusable-deploy-ecs.yml@main
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
    with:
      ecr_repository: stream-engine
      ecs_service: stream-engine
      docker_context: .
